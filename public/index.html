<!doctype html>
<html lang="en">
  <head>

    <title>calendarmerge</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        margin: 0;

        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f7fafc 0%, #e2e8f0 100%);

        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);

      }

        padding-left: 1.25rem;
      }

  <body>
    <main>
      <h1>calendarmerge</h1>
      <p>This storage endpoint publishes the merged calendar feed and its latest status document.</p>
      <ul>
        <li><a href="./calendar.ics">calendar.ics</a></li>
        <li><a href="./status.json">status.json</a></li>
      </ul>

</html>
