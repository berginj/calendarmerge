name: Deploy Calendar Merge

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "frontend/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/calendarmerge-functions.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test

      - name: Build backend deployment package
        shell: pwsh
        run: ./scripts/azure/package-functions.ps1

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Function App
        run: >
          az functionapp deployment source config-zip
          --resource-group "${{ vars.AZ_RESOURCE_GROUP }}"
          --name "${{ vars.AZ_FUNCTIONAPP_NAME }}"
          --src ".artifacts/calendarmerge-functions.zip"

      - name: Deploy Frontend to Blob Storage
        run: |
          az storage blob upload-batch \
            --account-name "${{ vars.AZ_STORAGE_ACCOUNT }}" \
            --destination '$web/manage' \
            --source "./frontend/build" \
            --overwrite true \
            --auth-mode login
